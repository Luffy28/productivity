<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum — Stay On Track</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF6F0; --warm-white: #FFF9F2; --amber: #E8873A;
    --amber-light: #F5A55C; --amber-pale: #FDE8D2; --brown: #3D2B1F;
    --brown-mid: #7A5C48; --brown-light: #B89080; --green: #5C8A5E;
    --green-pale: #D8EDD9; --red: #C0442A; --red-pale: #F9DDD8;
    --gray: #A89C94; --card-shadow: 0 2px 16px rgba(61,43,31,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--brown); min-height:100vh; }

  /* NAV */
  nav { background:var(--warm-white); border-bottom:1px solid rgba(61,43,31,0.08); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
  .nav-logo { font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:var(--amber); display:flex; align-items:center; gap:8px; }
  .nav-logo span { color:var(--brown); }
  .nav-links { display:flex; align-items:center; gap:8px; }
  .nav-btn { padding:7px 16px; border-radius:20px; font-family:'DM Sans',sans-serif; font-size:13.5px; font-weight:500; cursor:pointer; border:none; transition:all .18s; }
  .nav-btn-ghost { background:transparent; color:var(--brown-mid); }
  .nav-btn-ghost:hover { background:var(--amber-pale); color:var(--brown); }
  .nav-btn-primary { background:var(--amber); color:white; }
  .nav-btn-primary:hover { background:var(--amber-light); transform:translateY(-1px); }

  /* LAYOUT */
  .app-layout { max-width:900px; margin:0 auto; padding:32px 24px; display:grid; grid-template-columns:1fr 280px; gap:24px; }
  @media(max-width:680px){ .app-layout{grid-template-columns:1fr} .sidebar{order:-1} }

  /* STREAK */
  .streak-card { background:linear-gradient(135deg,var(--brown) 0%,#5C3D2A 100%); border-radius:20px; padding:28px; color:white; margin-bottom:20px; position:relative; overflow:hidden; animation:fadeSlideUp .4s ease both; }
  .streak-card::before { content:''; position:absolute; top:-40px; right:-40px; width:200px; height:200px; background:rgba(232,135,58,.15); border-radius:50%; }
  .streak-label { font-size:12px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; opacity:.6; margin-bottom:8px; }
  .streak-number { font-family:'Fraunces',serif; font-size:64px; font-weight:700; line-height:1; color:var(--amber-light); position:relative; z-index:1; }
  .streak-text { font-size:18px; opacity:.85; margin-top:4px; position:relative; z-index:1; }
  .streak-dots { display:flex; gap:6px; margin-top:20px; position:relative; z-index:1; }
  .streak-dot { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:500; opacity:.7; flex-direction:column; gap:2px; }
  .streak-dot.active { background:var(--amber); opacity:1; }

  /* TASKS HEADER */
  .tasks-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; animation:fadeSlideUp .4s .1s ease both; }
  .tasks-title { font-family:'Fraunces',serif; font-size:22px; font-weight:500; }
  .task-count { font-size:13px; color:var(--brown-light); background:var(--amber-pale); padding:4px 10px; border-radius:20px; font-weight:500; }
  .add-task-btn { background:var(--amber); color:white; border:none; border-radius:12px; padding:10px 18px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .18s; }
  .add-task-btn:hover { background:var(--amber-light); transform:translateY(-1px); box-shadow:0 4px 12px rgba(232,135,58,.3); }

  /* FILTER TABS */
  .filter-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; animation:fadeSlideUp .4s .15s ease both; }
  .filter-tab { padding:5px 14px; border-radius:20px; border:1.5px solid rgba(61,43,31,0.1); background:white; font-family:'DM Sans',sans-serif; font-size:12.5px; font-weight:500; cursor:pointer; transition:all .18s; color:var(--brown-mid); }
  .filter-tab:hover { border-color:var(--brown-light); }
  .filter-tab.f-active     { background:var(--brown);  color:white; border-color:var(--brown); }
  .filter-tab.f-active-high   { background:#B91C1C; color:white; border-color:#B91C1C; }
  .filter-tab.f-active-medium { background:#92400E; color:white; border-color:#92400E; }
  .filter-tab.f-active-low    { background:#065F46; color:white; border-color:#065F46; }

  /* ADD FORM */
  .add-task-form { background:var(--warm-white); border:1.5px solid var(--amber-pale); border-radius:16px; padding:20px; margin-bottom:16px; display:none; animation:fadeSlideUp .25s ease both; }
  .add-task-form.visible { display:block; }
  .form-row { display:flex; gap:10px; align-items:flex-end; }
  .form-field { flex:1; }
  .form-field label { display:block; font-size:11px; font-weight:500; letter-spacing:.8px; text-transform:uppercase; color:var(--brown-light); margin-bottom:6px; }
  .form-input { width:100%; padding:10px 14px; border:1.5px solid rgba(61,43,31,.12); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--brown); background:white; outline:none; transition:border-color .18s; }
  .form-input:focus { border-color:var(--amber); }
  .form-actions { display:flex; gap:8px; margin-top:14px; justify-content:flex-end; }
  .btn-cancel { padding:9px 16px; border-radius:10px; border:1.5px solid rgba(61,43,31,.12); background:white; color:var(--brown-mid); font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; }
  .btn-save { padding:9px 20px; border-radius:10px; border:none; background:var(--amber); color:white; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .18s; }
  .btn-save:hover { background:var(--amber-light); }

  /* PRIORITY SELECTOR (in form) */
  .priority-selector { display:flex; gap:6px; }
  .pri-btn { padding:6px 14px; border-radius:20px; border:1.5px solid rgba(61,43,31,0.12); background:white; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all .18s; color:var(--brown-mid); }
  .pri-btn:hover { border-color:var(--brown-light); }
  .pri-btn.sel-high   { background:#FEE2E2; border-color:#B91C1C; color:#B91C1C; font-weight:600; }
  .pri-btn.sel-medium { background:#FEF3C7; border-color:#92400E; color:#92400E; font-weight:600; }
  .pri-btn.sel-low    { background:#D1FAE5; border-color:#065F46; color:#065F46; font-weight:600; }

  /* TASK CARDS */
  .task-list { display:flex; flex-direction:column; gap:10px; }
  .task-card { background:var(--warm-white); border:1px solid rgba(61,43,31,.07); border-radius:14px; padding:16px 18px; display:flex; align-items:center; gap:14px; transition:all .2s; animation:fadeSlideUp .35s ease both; }
  .task-card:hover { box-shadow:var(--card-shadow); transform:translateY(-1px); }
  .task-card.completed { opacity:.6; }
  .task-card.completed .task-title { text-decoration:line-through; color:var(--brown-light); }
  .task-card.warned { border-color:rgba(192,68,42,.2); background:linear-gradient(135deg,var(--warm-white),#FFF5F3); }

  /* Priority left border accent */
  .task-card.pri-high   { border-left:3px solid #B91C1C; }
  .task-card.pri-medium { border-left:3px solid #D97706; }
  .task-card.pri-low    { border-left:3px solid #059669; }

  .task-checkbox { width:22px; height:22px; border-radius:50%; border:2px solid rgba(61,43,31,.2); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .18s; background:white; }
  .task-checkbox:hover { border-color:var(--amber); }
  .task-checkbox.checked { background:var(--green); border-color:var(--green); }
  .task-checkbox.checked::after { content:'✓'; color:white; font-size:12px; font-weight:700; }
  .task-body { flex:1; min-width:0; }
  .task-title { font-size:15px; font-weight:500; color:var(--brown); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .task-meta { display:flex; align-items:center; gap:8px; margin-top:4px; flex-wrap:wrap; }
  .task-due { font-size:12px; color:var(--brown-light); }
  .task-due.overdue { color:var(--red); font-weight:500; }
  .task-badge { font-size:11px; font-weight:500; padding:2px 8px; border-radius:20px; }
  .badge-warn { background:var(--red-pale); color:var(--red); }
  .postpone-count { font-size:12px; color:var(--brown-light); }

  /* Priority badge on card */
  .pri-badge { font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; }
  .pri-badge-high   { background:#FEE2E2; color:#B91C1C; }
  .pri-badge-medium { background:#FEF3C7; color:#92400E; }
  .pri-badge-low    { background:#D1FAE5; color:#065F46; }

  /* Inline priority changer on card */
  .pri-change { display:none; gap:4px; }
  .task-card:hover .pri-change { display:flex; }
  .pri-change-btn { padding:2px 8px; border-radius:20px; border:1px solid rgba(61,43,31,.1); background:white; font-size:11px; font-weight:500; cursor:pointer; color:var(--brown-mid); transition:all .15s; }
  .pri-change-btn:hover { border-color:var(--amber); color:var(--amber); }
  .pri-change-btn.cur-high   { background:#FEE2E2; color:#B91C1C; border-color:#B91C1C; }
  .pri-change-btn.cur-medium { background:#FEF3C7; color:#92400E; border-color:#D97706; }
  .pri-change-btn.cur-low    { background:#D1FAE5; color:#065F46; border-color:#059669; }

  .task-delete { background:none; border:none; cursor:pointer; color:var(--brown-light); font-size:14px; padding:4px; border-radius:6px; transition:all .18s; opacity:0; }
  .task-card:hover .task-delete { opacity:1; }
  .task-delete:hover { background:var(--red-pale); color:var(--red); }

  /* SIDEBAR */
  .sidebar { display:flex; flex-direction:column; gap:16px; }
  .sidebar-card { background:var(--warm-white); border:1px solid rgba(61,43,31,.07); border-radius:16px; padding:20px; animation:fadeSlideUp .4s .15s ease both; }
  .sidebar-title { font-family:'Fraunces',serif; font-size:15px; font-weight:500; margin-bottom:14px; color:var(--brown); }
  .stat-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(61,43,31,.06); font-size:14px; color:var(--brown-mid); }
  .stat-row:last-child { border-bottom:none; }
  .stat-value { font-family:'Fraunces',serif; font-size:20px; color:var(--brown); font-weight:700; }

  /* Priority breakdown in sidebar */
  .pri-bar-row { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; color:var(--brown-mid); }
  .pri-bar-row:not(:last-child) { border-bottom:1px solid rgba(61,43,31,.06); }
  .pri-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .pri-dot-high   { background:#B91C1C; }
  .pri-dot-medium { background:#D97706; }
  .pri-dot-low    { background:#059669; }
  .pri-bar-label { flex:1; }
  .pri-bar-count { font-family:'Fraunces',serif; font-size:16px; font-weight:700; color:var(--brown); }

  /* EMPTY */
  .empty-state { text-align:center; padding:48px 24px; color:var(--brown-light); }
  .empty-emoji { font-size:40px; margin-bottom:12px; }
  .empty-title { font-family:'Fraunces',serif; font-size:18px; font-weight:500; color:var(--brown-mid); margin-bottom:6px; }
  .empty-sub { font-size:14px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(61,43,31,.4); backdrop-filter:blur(4px); z-index:200; display:none; align-items:center; justify-content:center; animation:fadeIn .2s ease; }
  .modal-overlay.visible { display:flex; }
  .modal { background:var(--warm-white); border-radius:20px; padding:32px; max-width:460px; width:90%; animation:scaleIn .25s ease; }
  .modal-icon { font-size:36px; margin-bottom:12px; }
  .modal-title { font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:var(--brown); margin-bottom:8px; }
  .modal-desc { font-size:14px; color:var(--brown-mid); margin-bottom:24px; line-height:1.6; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
  .btn-primary { padding:10px 20px; border-radius:10px; border:none; background:var(--amber); color:white; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all .18s; }
  .btn-primary:hover { background:var(--amber-light); }
  .btn-secondary { padding:10px 20px; border-radius:10px; border:1.5px solid rgba(61,43,31,.12); background:white; color:var(--brown-mid); font-family:'DM Sans',sans-serif; font-size:14px; cursor:pointer; }

  /* AUTH */
  .auth-page { min-height:100vh; display:none; align-items:center; justify-content:center; background:var(--cream); }
  .auth-page.visible { display:flex; }
  .auth-card { background:var(--warm-white); border-radius:24px; padding:48px 40px; width:100%; max-width:400px; box-shadow:0 8px 40px rgba(61,43,31,.12); animation:scaleIn .3s ease; }
  .auth-logo { font-family:'Fraunces',serif; font-size:28px; font-weight:700; color:var(--amber); margin-bottom:4px; text-align:center; }
  .auth-subtitle { text-align:center; color:var(--brown-light); font-size:14px; margin-bottom:32px; }
  .auth-tabs { display:flex; background:var(--cream); border-radius:12px; padding:4px; margin-bottom:24px; }
  .auth-tab { flex:1; padding:8px; text-align:center; border-radius:9px; cursor:pointer; font-size:14px; font-weight:500; color:var(--brown-light); transition:all .18s; border:none; background:none; }
  .auth-tab.active { background:white; color:var(--amber); box-shadow:0 1px 6px rgba(61,43,31,.1); }
  .auth-field { margin-bottom:16px; }
  .auth-field label { display:block; font-size:12px; font-weight:500; letter-spacing:.8px; text-transform:uppercase; color:var(--brown-light); margin-bottom:6px; }
  .auth-input { width:100%; padding:12px 16px; border:1.5px solid rgba(61,43,31,.12); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--brown); background:white; outline:none; transition:border-color .18s; }
  .auth-input:focus { border-color:var(--amber); }
  .auth-submit { width:100%; padding:13px; background:var(--amber); color:white; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; margin-top:8px; transition:all .18s; }
  .auth-submit:hover { background:var(--amber-light); transform:translateY(-1px); }
  .msg { padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:14px; display:none; }
  .msg-error { background:var(--red-pale); color:var(--red); }
  .msg-success { background:var(--green-pale); color:var(--green); }

  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* VIEW SWITCHER */
  .view-switcher { display:flex; background:var(--warm-white); border:1px solid rgba(61,43,31,.08); border-radius:14px; padding:4px; margin-bottom:20px; width:fit-content; gap:2px; }
  .view-tab { padding:7px 20px; border-radius:10px; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:13.5px; font-weight:500; cursor:pointer; color:var(--brown-mid); transition:all .18s; }
  .view-tab.active { background:var(--amber); color:white; box-shadow:0 2px 8px rgba(232,135,58,.3); }
  .view-tab:not(.active):hover { background:var(--amber-pale); color:var(--brown); }

  /* CALENDAR */
  .calendar-wrap { animation:fadeSlideUp .3s ease both; }
  .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-month { font-family:'Fraunces',serif; font-size:22px; font-weight:500; }
  .cal-nav-btn { width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(61,43,31,.12); background:white; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .18s; color:var(--brown-mid); }
  .cal-nav-btn:hover { border-color:var(--amber); color:var(--amber); background:var(--amber-pale); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day-header { text-align:center; font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--brown-light); padding:6px 0; }
  .cal-cell { min-height:80px; background:var(--warm-white); border:1px solid rgba(61,43,31,.06); border-radius:10px; padding:6px; cursor:pointer; transition:all .18s; position:relative; }
  .cal-cell:hover { border-color:var(--amber-light); box-shadow:0 2px 8px rgba(61,43,31,.06); }
  .cal-cell.other-month { background:rgba(250,246,240,.4); opacity:.5; }
  .cal-cell.today { border-color:var(--amber); border-width:2px; }
  .cal-cell.today .cal-date { background:var(--amber); color:white; }
  .cal-cell.selected { border-color:var(--brown); border-width:2px; background:linear-gradient(135deg,var(--warm-white),var(--amber-pale)); }
  .cal-date { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; margin-bottom:4px; }
  .cal-task-dot { font-size:10px; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-radius:4px; padding:1px 4px; margin-bottom:2px; }
  .cal-task-dot.pri-high   { background:#FEE2E2; color:#B91C1C; }
  .cal-task-dot.pri-medium { background:#FEF3C7; color:#92400E; }
  .cal-task-dot.pri-low    { background:#D1FAE5; color:#065F46; }
  .cal-task-dot.done       { opacity:.45; text-decoration:line-through; }
  .cal-more { font-size:10px; color:var(--brown-light); font-weight:500; margin-top:2px; }

  /* DAY DETAIL PANEL */
  .day-detail { background:var(--warm-white); border:1px solid rgba(61,43,31,.08); border-radius:16px; padding:20px; margin-top:16px; animation:fadeSlideUp .2s ease both; }
  .day-detail-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .day-detail-title { font-family:'Fraunces',serif; font-size:17px; font-weight:500; }
  .day-detail-close { background:none; border:none; cursor:pointer; color:var(--brown-light); font-size:18px; padding:2px 6px; border-radius:6px; }
  .day-detail-close:hover { background:var(--amber-pale); color:var(--brown); }
  .day-task-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(61,43,31,.06); }
  .day-task-row:last-child { border-bottom:none; }
  .day-task-check { width:18px; height:18px; border-radius:50%; border:2px solid rgba(61,43,31,.2); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .18s; }
  .day-task-check:hover { border-color:var(--amber); }
  .day-task-check.done { background:var(--green); border-color:var(--green); }
  .day-task-check.done::after { content:'✓'; color:white; font-size:10px; font-weight:700; }
  .day-task-text { flex:1; font-size:14px; }
  .day-task-text.done { text-decoration:line-through; color:var(--brown-light); }
  .day-empty { text-align:center; padding:20px; color:var(--brown-light); font-size:14px; }


  /* ── AI FEEDBACK TAB ──────────────────────────────────────────────── */
  .ai-wrap { animation:fadeSlideUp .3s ease both; }
  .ai-hero { background:linear-gradient(135deg,#1e1b4b 0%,#312e81 60%,#4338ca 100%);
    border-radius:20px; padding:28px 32px; color:white; margin-bottom:20px; position:relative; overflow:hidden; }
  .ai-hero::before { content:''; position:absolute; top:-60px; right:-60px; width:220px; height:220px;
    background:rgba(139,92,246,.2); border-radius:50%; }
  .ai-hero::after  { content:'✨'; position:absolute; top:20px; right:28px; font-size:48px; opacity:.3; }
  .ai-hero-label { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; opacity:.6; margin-bottom:8px; }
  .ai-hero-title { font-family:'Fraunces',serif; font-size:28px; font-weight:700; line-height:1.2; margin-bottom:6px; }
  .ai-hero-sub   { font-size:14px; opacity:.75; }

  .ai-mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  @media(max-width:560px){ .ai-mode-grid{ grid-template-columns:1fr; } }
  .ai-mode-btn {
    background:var(--warm-white); border:1.5px solid rgba(61,43,31,.08);
    border-radius:14px; padding:14px 16px; cursor:pointer; text-align:left;
    transition:all .2s; font-family:'DM Sans',sans-serif;
  }
  .ai-mode-btn:hover { border-color:#818cf8; box-shadow:0 4px 16px rgba(99,102,241,.12); transform:translateY(-2px); }
  .ai-mode-btn.selected { border-color:#6366f1; background:linear-gradient(135deg,#eef2ff,#f5f3ff); }
  .ai-mode-icon  { font-size:24px; margin-bottom:6px; }
  .ai-mode-title { font-size:14px; font-weight:600; color:var(--brown); margin-bottom:2px; }
  .ai-mode-desc  { font-size:12px; color:var(--brown-light); line-height:1.4; }

  .ai-run-btn {
    width:100%; padding:14px; border:none; border-radius:14px; cursor:pointer;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:white; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
    transition:all .2s; margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .ai-run-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 20px rgba(99,102,241,.4); }
  .ai-run-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

  .ai-result-card {
    background:var(--warm-white); border:1px solid rgba(99,102,241,.15);
    border-radius:16px; padding:24px; animation:fadeSlideUp .3s ease both;
  }
  .ai-result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .ai-result-title { font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:#4338ca; }
  .ai-result-copy  { padding:5px 12px; border-radius:8px; border:1px solid rgba(99,102,241,.2);
    background:white; color:#6366f1; font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
  .ai-result-copy:hover { background:#eef2ff; }
  .ai-result-body { font-size:14px; line-height:1.8; color:var(--brown); white-space:pre-wrap; }
  .ai-result-body strong { color:var(--brown); }

  .ai-stats-row { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .ai-stat-chip  { background:var(--warm-white); border:1px solid rgba(61,43,31,.08); border-radius:12px;
    padding:10px 14px; flex:1; min-width:80px; text-align:center; }
  .ai-stat-num   { font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:var(--brown); }
  .ai-stat-label { font-size:11px; color:var(--brown-light); margin-top:2px; }
  .ai-stat-chip.danger .ai-stat-num { color:var(--red); }
  .ai-stat-chip.warn   .ai-stat-num { color:#D97706; }
  .ai-stat-chip.good   .ai-stat-num { color:var(--green); }

  .ai-spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.3);
    border-top-color:white; border-radius:50%; animation:spin .7s linear infinite; }


  /* ── AI ADVISOR PAGE ─────────────────────────────────────────────── */
  .ai-page { display:none; max-width:900px; margin:0 auto; padding:32px 24px; }
  .ai-page.visible { display:block; }

  .api-key-banner { display:flex; align-items:flex-start; gap:16px; background:var(--warm-white);
    border:1.5px solid rgba(61,43,31,.1); border-radius:16px; padding:20px 24px; margin-bottom:24px; }
  .api-key-banner.connected { border-color:var(--green); background:var(--green-pale); }
  .api-key-icon  { font-size:28px; flex-shrink:0; }
  .api-key-body  { flex:1; }
  .api-key-title { font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin-bottom:4px; }
  .api-key-sub   { font-size:13px; color:var(--brown-light); margin-bottom:10px; }
  .api-key-input-row { display:flex; gap:8px; }
  .api-key-input { flex:1; padding:9px 14px; border:1.5px solid rgba(61,43,31,.15); border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:13px; outline:none; }
  .api-key-input:focus { border-color:var(--amber); }
  .api-key-save  { padding:9px 18px; background:var(--amber); color:white; border:none;
    border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; }
  .api-key-clear { padding:7px 14px; background:transparent; color:var(--red); border:1.5px solid var(--red);
    border-radius:10px; font-size:13px; cursor:pointer; margin-left:auto; white-space:nowrap; }

  .ai-run-all { width:100%; padding:14px; margin-bottom:24px; border:none; border-radius:14px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6); color:white;
    font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer;
    transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .ai-run-all:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 20px rgba(99,102,241,.35); }
  .ai-run-all:disabled { opacity:.5; cursor:not-allowed; }

  .ai-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:640px){ .ai-grid{ grid-template-columns:1fr; } }

  .ai-card { background:var(--warm-white); border:1px solid rgba(61,43,31,.08);
    border-radius:16px; padding:20px; display:flex; flex-direction:column; gap:10px; }
  .ai-card-wide { grid-column:1 / -1; }
  .ai-card-header { display:flex; align-items:center; gap:10px; }
  .ai-card-icon  { font-size:22px; }
  .ai-card-title { font-family:'Fraunces',serif; font-size:16px; font-weight:600; }
  .ai-card-desc  { font-size:13px; color:var(--brown-light); line-height:1.5; }

  .ai-card .ai-run-btn { padding:9px 16px; border:none; border-radius:10px; cursor:pointer;
    background:linear-gradient(135deg,#6366f1,#8b5cf6); color:white;
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
    transition:all .18s; display:flex; align-items:center; gap:6px; width:fit-content; }
  .ai-card .ai-run-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 4px 12px rgba(99,102,241,.3); }
  .ai-card .ai-run-btn:disabled { opacity:.5; cursor:not-allowed; }

  .ai-result { display:none; margin-top:4px; }
  .ai-result.visible { display:block; }
  .ai-result-inner { font-size:13.5px; line-height:1.75; color:var(--brown); }
  .ai-result-inner h3 { font-family:'Fraunces',serif; font-size:15px; font-weight:600;
    color:#4338ca; margin:14px 0 6px; }
  .ai-result-inner strong { font-weight:600; color:var(--brown); }
  .ai-result-inner ul { padding-left:18px; margin:6px 0; }
  .ai-result-inner li { margin:3px 0; }

  .score-meter { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .score-bar-bg   { flex:1; height:10px; background:rgba(61,43,31,.08); border-radius:99px; overflow:hidden; }
  .score-bar-fill { height:100%; border-radius:99px; transition:width .8s cubic-bezier(.4,0,.2,1); }
  .score-label    { font-family:'Fraunces',serif; font-size:18px; font-weight:700; min-width:40px; text-align:right; }

  .ai-cursor { display:inline-block; width:2px; height:14px; background:#6366f1;
    margin-left:2px; vertical-align:middle; animation:blink .7s step-end infinite; }
  @keyframes blink { 50% { opacity:0; } }

  @keyframes fadeSlideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes scaleIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
</style>
</head>

<!-- AUTH -->
<div class="auth-page visible" id="authPage">
  <div class="auth-card">
    <div class="auth-logo">🔥 Momentum</div>
    <div class="auth-subtitle">Stay consistent. Avoid burnout.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Log In</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Sign Up</button>
    </div>
    <div class="msg msg-error" id="authError"></div>
    <div class="msg msg-success" id="authSuccess"></div>
    <div class="auth-field">
      <label>Email</label>
      <input class="auth-input" type="email" id="authEmail" placeholder="you@college.edu" autocomplete="off">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input class="auth-input" type="password" id="authPass" placeholder="8+ characters" autocomplete="new-password">
    </div>
    <button class="auth-submit" id="authSubmit" onclick="handleAuth()">Log In</button>
  </div>
</div>
